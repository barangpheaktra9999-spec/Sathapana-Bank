<!doctype html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sathapana Bank Prototype</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Battambang:wght@100;300;400;700;900&display=swap');
    body { font-family: "Battambang", sans-serif; }
    
    /* Responsive Header Adjustments */
    .brand-logo { max-width: 250px; height: auto; }
    .nav-icons { display: flex; align-items: center; gap: 15px; }
    
    @media (max-width: 991px) {
      .search-form { width: 100% !important; margin-top: 15px; }
      .brand-container { justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg" style="background-color: rgb(5, 63, 139)">
    <div class="container">
      <a class="navbar-brand text-white" href="#">អំពីធនាគារស្ថាបនា</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon bg-light"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link text-white" href="#">ព័ត៌មាន</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">ទំនាក់ទំនង</a></li>
        </ul>
        <div class="nav-icons">
          <i class="fa-brands fa-facebook text-white"></i>
          <i class="fa-brands fa-linkedin text-white"></i>
          <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_Cambodia.svg" alt="KH" style="width:25px;">
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-3">
    <div class="row align-items-center brand-container">
      <div class="col-lg-6 text-center text-lg-start">
        <img src="https://media.licdn.com/dms/image/v2/C5612AQF2wGpOwAlHOg/article-cover_image-shrink_720_1280/article-cover_image-shrink_720_1280/0/1591073215020?e=2147483647&v=beta&t=aN4iIz_d8vdQh43uQ429piCPtXJLfvdjgsVHs-1VsBg" class="img-fluid brand-logo" alt="Logo">
      </div>
      <div class="col-lg-6">
        <form class="d-flex search-form w-100" role="search">
          <input class="form-control me-2" type="search" placeholder="ស្វែងរកក្នុងវេបសាយ...">
          <button class="btn btn-outline-primary" type="submit">ស្វែងរក</button>
        </form>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg" style="background-color: rgb(5, 63, 139)">
    <div class="container">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
        <span class="navbar-toggler-icon bg-light"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainMenu">
        <div class="navbar-nav">
          <a class="nav-link text-white px-3" href="#">ទំព័រដើម</a>
          <a class="nav-link text-white px-3" href="#">សេវាបុគ្គល</a>
          <a class="nav-link text-white px-3" href="#">សេវាអាជីវកម្ម</a>
          <a class="nav-link text-white px-3" href="#">ធនាគារឌីជីថល</a>
        </div>
      </div>
    </div>
  </nav>

  <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active"><img src="https://www.sovannaphumlife.com/wp-content/uploads/2024/05/SVL_Payment-gateaway_Web-Slide_V2-04-2-scaled-2000x550.jpg" class="d-block w-100" alt="Banner"></div>
      <div class="carousel-item"><img src="https://www.sathapana.com.kh/uploads/0acd4ed1f9395860fa7e8bdbdbf56b596888cc35/New-Sathapana-Mobile.jpg" class="d-block w-100" alt="Banner"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
